name: Publish Package to GitHub Packages

on:
  push:
    branches:
      - main
    paths:
      - 'packages/bitcoin-native/package.json'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@earnwithalee7890'
      - run: npm install
        working-directory: ./packages/bitcoin-native
      - run: npm publish
        working-directory: ./packages/bitcoin-native
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
